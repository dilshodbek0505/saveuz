# Без actions/checkout и actions/cache — runner не качает ничего с GitHub, нет таймаутов.
name: saveuz-deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Deploy backend
        run: |
          set -e
          _ts() { echo "[$(date -u +%H:%M:%S)] $*"; }

          cd /var/www/saveuz

          _ts "📥 Pulling code"
          git pull origin main
          _ts "   pull done"

          _ts "🐍 Activate venv"
          source venv/bin/activate

          _ts "📦 Install requirements (skip if unchanged)"
          REQUIREMENTS_HASH=$(git rev-parse HEAD:requirements.txt 2>/dev/null || cat requirements.txt | md5sum | cut -c1-32)
          if [ -f .pip-requirements-hash ] && [ "$(cat .pip-requirements-hash)" = "$REQUIREMENTS_HASH" ]; then
            echo "   requirements unchanged, skipping pip install"
          else
            pip install -r requirements.txt
            echo "$REQUIREMENTS_HASH" > .pip-requirements-hash
          fi
          _ts "   requirements done"

          _ts "🧱 Migrations"
          python manage.py makemigrations --noinput || true
          python manage.py makemigrations --merge --noinput || true
          python manage.py migrate --noinput
          _ts "   migrations done"

          _ts "🎨 Collect static"
          python manage.py collectstatic --noinput
          _ts "   static done"

          _ts "🔧 Nginx (if needed)"
          [ -f "scripts/setup_nginx_upload_limit.sh" ] && sudo bash scripts/setup_nginx_upload_limit.sh || true

          _ts "🔁 Restart supervisor"
          sudo supervisorctl restart saveuz

          _ts "✅ Deploy finished"
