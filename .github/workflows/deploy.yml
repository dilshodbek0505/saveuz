name: saveuz-deploy

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy backend
        run: |
          set -e

          cd /var/www/saveuz

          echo "📥 Pulling code"
          git pull origin main

          echo "🐍 Activate venv"
          source venv/bin/activate

          echo "📦 Install requirements"
          pip install -r requirements.txt

          echo "🧱 Create migrations (if needed)"
          python manage.py makemigrations --noinput || true

          echo "🧱 Merge migrations (if multiple leaves)"
          python manage.py makemigrations --merge --noinput || true

          echo "🧱 Apply migrations"
          python manage.py migrate --noinput

          echo "🎨 Collect static"
          python manage.py collectstatic --noinput

          echo "🔧 Setup nginx upload limits (if needed)"
          if [ -f "scripts/setup_nginx_upload_limit.sh" ]; then
            sudo bash scripts/setup_nginx_upload_limit.sh || echo "⚠️  Nginx setup skipped (may need manual configuration)"
          fi

          echo "🔁 Restart supervisor"
          sudo supervisorctl restart saveuz

          echo "✅ Deploy finished"
